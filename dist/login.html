<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamFun - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f23; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-card { background: #1a1a2e; border-radius: 8px; padding: 40px; width: 100%; max-width: 360px; }
    .login-card h1 { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 32px; }
    .login-card input { width: 100%; padding: 10px 12px; border-radius: 4px; border: 1px solid #555; background: #0f0f23; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none; }
    .login-card input:focus { border-color: #4a4aff; }
    .login-card button { width: 100%; padding: 10px; border-radius: 4px; border: none; background: #4a4aff; color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 4px; }
    .login-card button:hover { background: #5c5cff; }
    #error { color: #ff6b6b; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>FamFun</h1>
    <form id="login-form">
      <input id="username" type="text" placeholder="Username" required autocomplete="username">
      <input id="password" type="password" placeholder="Password" required autocomplete="current-password">
      <button type="submit">Login</button>
      <div id="error"></div>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      errorDiv.style.display = 'none';

      try {
        const resp = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        if (resp.ok) {
          window.location.href = '/';
        } else {
          const data = await resp.json();
          errorDiv.textContent = data.error || 'Login failed';
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        errorDiv.textContent = 'Connection error';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
